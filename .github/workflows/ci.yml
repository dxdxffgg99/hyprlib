name: HYPRLIB CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 24.04 / GCC / x86_64
            runs_on: ubuntu-24.04
            compiler: gcc
            c_compiler: gcc
          - name: Ubuntu 24.04 / Clang / x86_64
            runs_on: ubuntu-24.04
            compiler: clang
            c_compiler: clang
          - name: Ubuntu 24.04 ARM / GCC / aarch64
            runs_on: ubuntu-24.04-arm
            compiler: gcc
            c_compiler: gcc
          - name: Ubuntu 24.04 ARM / Clang / aarch64
            runs_on: ubuntu-24.04-arm
            compiler: clang
            c_compiler: clang
          - name: macOS 14 / Clang / aarch64
            runs_on: macos-14
            compiler: clang
            c_compiler: clang
          - name: macOS 13 / Clang / x86_64
            runs_on: macos-13
            compiler: clang
            c_compiler: clang
          - name: Windows / Clang-CL / x86_64
            runs_on: windows-latest
            compiler: clang
            c_compiler: clang-cl
          - name: Windows / MSVC / x86_64
            runs_on: windows-latest
            compiler: msvc
            c_compiler: msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}

      - name: Configure (Windows / MSVC)
        if: runner.os == 'Windows' && matrix.compiler == 'msvc'
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Configure (Windows / Clang-CL)
        if: runner.os == 'Windows' && matrix.compiler == 'clang'
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -T ClangCL

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel

      - name: Test (Linux/macOS)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build --build-config Release --output-on-failure